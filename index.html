<body>

    <header class="hero-section">
        <h1>STAY FRESH.</h1>

            <input type="text" id="cologne-search" placeholder="Search (e.g. 'Male', 'Vanilla')..." autocomplete="off">

    <main>
        <!-- Catalog Grid -->
        <section id="cologne-catalog">

        <!-- Contact Section with AJAX Fix -->
        <section class="contact-zone">
            <h3>Hit Us Up 🎤</h3>
            <form id="contact-form">
                <input type="email" name="email" id="email" placeholder="Your Email" required>
                <textarea name="message" id="message" placeholder="What's on your mind?" required></textarea>
                <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
            </form>
            <p id="form-status" style="display:none; color: #00fbff; margin-top: 15px; font-weight: bold;">
                Message sent! We'll get back to you soon. 🔥
            </p>
        </section>
